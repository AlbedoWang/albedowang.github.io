<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blog — Kaijian Wang</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-light.min.css" />
<style>
  :root {
    --bg: #faf9f5;
    --bg-soft: #f0eee6;
    --fg: #2c2b28;
    --muted: #8c8a82;
    --dim: #b5b2a8;
    --accent: #c96442;
    --accent-2: #8a6240;
    --warn: #b7873a;
    --err: #bc4a3c;
    --selection: #e8e4d4;
    --border: #e3ddcb;
    --titlebar: #eae6d7;
    --code-bg: #f5f2e8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 14.5px;
    line-height: 1.7;
  }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 28px 20px 80px;
  }
  ::selection { background: var(--selection); }
  a { color: var(--accent-2); text-decoration: none; border-bottom: 1px dashed transparent; }
  a:hover { border-bottom-color: var(--accent-2); }

  .terminal { width: 100%; max-width: 860px; }
  .titlebar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: var(--titlebar);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .dot.r { background: #ed6a5e; }
  .dot.y { background: #f4bf50; }
  .dot.g { background: #61c554; }
  .titlebar .path {
    margin-left: 10px; color: var(--muted); font-size: 12.5px; user-select: none;
  }
  .screen {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 0 0 10px 10px;
    padding: 24px 30px 28px;
  }
  .nav { margin-bottom: 16px; color: var(--muted); font-size: 13px; }
  .nav a { color: var(--accent); }

  #content h1, #content h2, #content h3, #content h4 {
    color: var(--fg);
    margin: 1.4em 0 0.5em;
    line-height: 1.3;
    font-weight: 700;
  }
  #content > h1:first-child { margin-top: 0.2em; }
  #content h1 { font-size: 19px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  #content h2 { font-size: 16px; color: var(--accent); }
  #content h2::before { content: "# "; color: var(--dim); }
  #content h3 { font-size: 14.5px; color: var(--accent-2); }
  #content p { margin: 0 0 12px; }
  #content ul, #content ol { padding-left: 22px; margin: 0 0 12px; }
  #content li { margin: 4px 0; }
  #content blockquote {
    margin: 12px 0;
    padding: 6px 14px;
    border-left: 3px solid var(--accent);
    background: rgba(201, 100, 66, 0.06);
    color: var(--fg);
  }
  #content blockquote p:last-child { margin-bottom: 0; }
  #content code {
    background: rgba(44, 43, 40, 0.06);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 13px;
  }
  #content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    overflow-x: auto;
    margin: 10px 0 14px;
    font-size: 13px;
    line-height: 1.55;
  }
  #content pre code { background: transparent; padding: 0; font-size: 13px; }
  #content table {
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
    display: block;
    overflow-x: auto;
    max-width: 100%;
  }
  #content th, #content td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
    vertical-align: top;
  }
  #content th { background: var(--titlebar); }
  #content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }
  #content img { max-width: 100%; }
  .err { color: var(--err); }
  .loading { color: var(--muted); }

  @media (max-width: 560px) {
    body { padding: 12px 10px 60px; }
    .screen { padding: 18px 16px 16px; }
  }
</style>
</head>
<body>
  <main class="terminal">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="path" id="path">guest@kaijian-phd:~/blogs</span>
    </div>
    <div class="screen">
      <div class="nav"><a href="../index.html">← back</a></div>
      <article id="content" class="loading">loading…</article>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const post = (params.get("post") || "").replace(/[^a-zA-Z0-9_-]/g, "");
    const content = document.getElementById("content");
    const pathEl = document.getElementById("path");

    if (!post) {
      content.classList.remove("loading");
      content.classList.add("err");
      content.textContent = "no post specified — append ?post=<slug> to the URL";
    } else {
      pathEl.textContent = `guest@kaijian-phd:~/blogs/${post}.md`;
      fetch(`./${post}.md`)
        .then((r) => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
        .then((md) => {
          marked.setOptions({ gfm: true, breaks: false });
          content.classList.remove("loading");
          content.innerHTML = marked.parse(md);
          content.querySelectorAll("pre code").forEach((b) => {
            try { hljs.highlightElement(b); } catch (_) {}
          });
          const h1 = content.querySelector("h1");
          if (h1) document.title = h1.textContent + " — Kaijian Wang";
        })
        .catch((e) => {
          content.classList.remove("loading");
          content.classList.add("err");
          content.textContent = `failed to load post: ${e.message}`;
        });
    }
  </script>
</body>
</html>
